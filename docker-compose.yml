services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: breadcrumb
      POSTGRES_PASSWORD: breadcrumb
      POSTGRES_DB: breadcrumb
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U breadcrumb"]
      interval: 2s
      timeout: 2s
      retries: 15
    volumes:
      - breadcrumb-postgres:/var/lib/postgresql/data

volumes:
  breadcrumb-postgres:
